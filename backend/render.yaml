services:
  - type: web
    name: myapp-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: ALLOWED_ORIGINS
        value: https://chris-kc-cheng.github.io   # update to your GitHub Pages URL
